<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Date Extension</title>

    <!-- Tableau Extensions API (너가 쓰던 방식 유지: lib 경로) -->
    <script src="lib/tableau.extensions.1.latest.min.js"></script>

    <!-- Flatpickr (이미 분리해뒀다고 했으니 경로만 맞추면 됨) -->
    <link rel="stylesheet" href="vendor/flatpickr/flatpickr.min.css" />
    <script src="vendor/flatpickr/flatpickr.min.js"></script>
    <script src="vendor/flatpickr/l10n/ko.js"></script>

    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div class="root">
      <div class="topbar">
        <div class="title">조회기간</div>

        <!-- authoring에서만 표시 -->
        <button id="settingsBtn" class="iconBtn" type="button" aria-label="설정">
          ⚙
        </button>
      </div>

      <div class="row">
        <div class="label">시작일</div>
        <input id="startInput" class="input" type="text" placeholder="날짜 선택" />
      </div>

      <div class="row" id="endRow">
        <div class="label">종료일</div>
        <input id="endInput" class="input" type="text" placeholder="날짜 선택" />
      </div>

      <div class="actions">
        <button id="applyBtn" class="btn primary" type="button">적용</button>
        <button id="closeBtn" class="btn" type="button">닫기</button>
      </div>

      <div id="hint" class="hint"></div>
    </div>

    <script src="main.js"></script>
  </body>
</html>
