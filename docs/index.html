<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Custom Date Range Picker</title>

  <!-- Local libs -->
  <script src="./lib/tableau.extensions.1.latest.min.js"></script>
  <link rel="stylesheet" href="./lib/flatpickr.min.css" />
  <script src="./lib/flatpickr.min.js"></script>

  <link rel="stylesheet" href="./styles.css" />
</head>

<body>
  <div class="app">
    <div class="topbar">
      <div class="title">기간 선택</div>

      <div class="applyRow">
        <label class="toggle">
          <input id="toggleAutoApply" type="checkbox" />
          <span>즉시 적용</span>
        </label>

        <button id="btnApply" class="btn primary">적용</button>
        <button id="btnReset" class="btn">초기화</button>
      </div>
    </div>

    <div class="navHeader">
      <button id="btnPrevMonth" class="navBtn" title="이전 달">◀</button>

      <div class="navCenter">
        <button id="btnYear" class="navPill" type="button">2026년</button>
        <button id="btnMonth" class="navPill" type="button">3월</button>
      </div>

      <button id="btnNextMonth" class="navBtn" title="다음 달">▶</button>
    </div>

    <div id="panelYear" class="panel hidden" aria-hidden="true">
      <div class="panelHead">
        <button id="btnPrevDecade" class="btn sm">이전 10년</button>
        <div id="txtDecade" class="panelTitle">2020~2029</div>
        <button id="btnNextDecade" class="btn sm">다음 10년</button>
      </div>
      <div id="gridYears" class="grid years"></div>
    </div>

    <div id="panelMonth" class="panel hidden" aria-hidden="true">
      <div class="panelHead">
        <div class="panelTitle">월 선택</div>
        <button id="btnCloseMonth" class="btn sm">닫기</button>
      </div>
      <div id="gridMonths" class="grid months"></div>
    </div>

    <div class="calendarWrap">
      <div id="calendar"></div>
    </div>

    <div class="seRow">
      <button id="boxStart" class="seBox" type="button">
        <div class="seLabel">시작일</div>
        <div id="txtStart" class="seValue">-</div>
      </button>

      <button id="boxEnd" class="seBox" type="button">
        <div class="seLabel">종료일</div>
        <div id="txtEnd" class="seValue">-</div>
      </button>

      <button id="btnBackToRange" class="btn ghost" type="button">기간 선택으로</button>
    </div>

    <div class="quickRow">
      <button class="chip" data-preset="today">오늘</button>
      <button class="chip" data-preset="last7">최근 7일</button>
      <button class="chip" data-preset="last30">최근 30일</button>
      <button class="chip" data-preset="thisMonth">이번달</button>
      <button class="chip" data-preset="last3m">최근 3개월</button>
      <button class="chip" data-preset="ytd">YTD</button>
    </div>

    <div class="statusRow">
      <div id="status" class="status">Tableau 연결 중…</div>
      <div id="mode" class="modeTag">MODE: range</div>
    </div>
  </div>

  <script src="./main.js"></script>
</body>
</html>
