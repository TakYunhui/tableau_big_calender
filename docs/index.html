<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Date UI</title>

  <!-- flatpickr css -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css"/>

  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="app" class="mode-summary">
    <!-- Topbar (항상 표시) -->
    <div class="topbar">
      <div class="rangeText" id="rangeText">조회기간: -</div>

      <div class="btnRow">
        <button class="btn ghost" id="btnEdit" type="button">기간변경</button>
        <button class="btn primary" id="btnApply" type="button">적용</button>
        <button class="btn" id="btnClose" type="button">닫기</button>
      </div>
    </div>

    <!-- 편집영역(달력+사이드) : edit 모드에서만 표시 -->
    <div class="editorArea" id="editorArea">
      <div class="calWrap">
        <input id="fp" class="fpInput" />
        <!-- flatpickr inline calendar가 여기에 붙음 -->
      </div>

      <div class="side">
        <div class="kv">
          <div class="k">시작</div><div class="v" id="startText">-</div>
          <div class="k">종료</div><div class="v" id="endText">-</div>
        </div>

        <div class="hint" id="hintText">
          • 달력에서 기간을 선택한 뒤 [적용]을 누르세요.<br/>
          • [닫기]는 편집을 취소합니다.
        </div>
      </div>
    </div>

    <!-- status (summary 모드에서도 보여서 36+24=약 60px 느낌) -->
    <div class="status" id="status"> </div>

    <!-- ✅ 눈속임 filler: summary 모드에서 남는 140px을 배경색으로 채워 "가림" 티 최소화 -->
    <div class="filler" aria-hidden="true"></div>
  </div>

  <!-- libs -->
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ko.js"></script>

  <!-- tableau extension api (Tableau에서만 존재. 로컬 테스트 시 없어도 try/catch로 통과) -->
  <script src="https://cdn.jsdelivr.net/npm/tableau-api@1.10.0/dist/tableau.extensions.1.latest.min.js"></script>

  <script src="./main.js"></script>
</body>
</html>
