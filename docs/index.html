<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>조회기간</title>

  <link rel="stylesheet" href="./lib/flatpickr.min.css" />
  <link rel="stylesheet" href="./styles.css?v=20260305_40" />
</head>

<body>
  <div id="rangeBar" class="rangeBar">
    <div class="rangeLine">
      <span class="label">시작날짜</span>
      <span class="value" id="startText">-</span>

      <span class="sep">|</span>

      <span class="label">종료날짜</span>
      <span class="value" id="endText">-</span>
    </div>

    <button id="settingsBtn" class="settingsBtn" type="button" aria-label="설정">⚙</button>
  </div>

  <input id="fpHidden" class="fpHidden" type="text" />
  <div id="hint" class="hint"></div>

  <script src="./lib/flatpickr.min.js"></script>
  <script src="https://extensions.tableauusercontent.com/resources/tableau.extensions.1.latest.min.js"></script>

  <!-- 캐시 방지: 숫자 계속 올려 -->
  <script src="./main.js?v=20260305_40"></script>
</body>
</html>
