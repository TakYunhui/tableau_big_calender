<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tableau Date Picker</title>

  <!-- flatpickr css -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />

  <!-- your css -->
  <link rel="stylesheet" href="./styles.css" />
</head>

<body>
  <div id="app" class="mode-summary">
    <!-- Top bar -->
    <div class="topbar">
      <div class="rangeText" id="rangeText">-</div>

      <div class="btnRow">
        <button id="btnEdit" class="btn primary" type="button">변경</button>
        <button id="btnClose" class="btn ghost" type="button">닫기</button>
        <button id="btnApply" class="btn primary" type="button">적용</button>
      </div>
    </div>

    <!-- Editor area -->
    <div class="editorArea">
      <div class="calWrap">
        <!-- flatpickr will attach here (inline calendar) -->
        <input id="fp" class="fpInput" aria-label="date-picker" />
      </div>

      <div class="side">
        <div class="kv">
          <div class="k">시작일</div><div class="v" id="startText">-</div>
          <div class="k">종료일</div><div class="v" id="endText">-</div>
        </div>

        <div class="hint" id="hintText">
          기간 선택 후 “적용”을 누르면 대시보드가 갱신됩니다.
        </div>
      </div>
    </div>

    <div class="status" id="statusText"></div>
  </div>

  <!-- Tableau Extensions API -->
  <script src="https://cdn.jsdelivr.net/npm/tableau-api@1.12.2/dist/tableau.extensions.1.latest.min.js"></script>

  <!-- flatpickr js -->
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ko.js"></script>

  <!-- your app js (flatpickr + tableau logic) -->
  <script src="./main.js"></script>
</body>
</html>
