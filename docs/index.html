<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Date UI</title>

    <!-- flatpickr (로컬: docs/lib) -->
    <link rel="stylesheet" href="docs/lib/flatpickr.min.css" />

    <!-- 너 styles.css -->
    <link rel="stylesheet" href="./styles.css?v=20260305_10" />
  </head>

  <body>
    <!-- 480x60 클릭 영역 -->
    <div id="rangeBar" class="rangeBar" role="button" tabindex="0">
      <div class="rangeCol">
        <div class="k">시작날짜</div>
        <div class="v" id="startText">-</div>
      </div>

      <div class="divider"></div>

      <div class="rangeCol">
        <div class="k">종료날짜</div>
        <div class="v" id="endText">-</div>
      </div>

      <!-- authoring에서만 설정 버튼 (작게) -->
      <button id="settingsBtn" class="settingsBtn" type="button" aria-label="설정">⚙</button>
    </div>

    <!-- flatpickr가 붙을 실제 input (화면에는 안 보이게) -->
    <input id="fpHidden" class="fpHidden" type="text" />

    <div id="hint" class="hint"></div>

    <!-- flatpickr (로컬: docs/lib) -->
    <script src="docs/lib/flatpickr.min.js"></script>

    <!-- Tableau Extensions API (하나만) -->
    <script src="https://extensions.tableauusercontent.com/resources/tableau.extensions.1.latest.min.js"></script>

    <script src="./main.js?v=20260305_10"></script>
  </body>
</html>
